<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 40">
  <!-- Blue background -->
  <rect width="60" height="40" fill="#012169"/>
  <!-- White diagonals (St. Andrew's saltire) -->
  <line x1="0" y1="0" x2="60" y2="40" stroke="white" stroke-width="13.3"/>
  <line x1="60" y1="0" x2="0" y2="40" stroke="white" stroke-width="13.3"/>
  <!-- Red counterchanged diagonals (St. Patrick's cross, offset) -->
  <line x1="0" y1="0" x2="60" y2="40" stroke="#C8102E" stroke-width="4.4"/>
  <line x1="60" y1="0" x2="0" y2="40" stroke="#C8102E" stroke-width="4.4"/>
  <!-- White cross (St. George's fimbriation) -->
  <rect x="25" y="0" width="10" height="40" fill="white"/>
  <rect x="0" y="15" width="60" height="10" fill="white"/>
  <!-- Red cross (St. George's) -->
  <rect x="27" y="0" width="6" height="40" fill="#C8102E"/>
  <rect x="0" y="17" width="60" height="6" fill="#C8102E"/>
</svg>
